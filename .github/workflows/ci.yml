- name: Install Python dependencies
  run: |
    pip install --upgrade pip
    pip install -r requirements.txt

- name: Lint Python scripts
  run: |
    if [ -d "scripts" ]; then
      flake8 scripts
    fi

- name: Run Cisco automation script (TEST MODE)
  run: |
    python scripts/cisco/push_config.py

- name: Install Ansible
  run: |
    pip install ansible

- name: Check Ansible playbooks
  run: |
    if [ -d "ansible/playbooks" ]; then
      ansible-playbook ansible/playbooks/*.yml --syntax-check || true
    fi

- name: Run Ansible test playbook
  run: |
    ansible-playbook -i ansible/inventory.ini ansible/playbooks/test.yml
