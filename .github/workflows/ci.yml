---
name: Network Automation CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install flake8

      - name: Lint Python scripts
        run: |
          if [ -d "scripts" ]; then
            flake8 scripts
          fi

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Check Ansible playbooks
        run: |
          if [ -d "ansible/playbooks" ]; then
            ansible-playbook ansible/playbooks/*.yml --syntax-check || true
          fi

      - name: Run Ansible test playbook
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/playbooks/test.yml
